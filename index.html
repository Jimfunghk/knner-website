<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Knner - Voice Transcription App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: white;
      text-align: center;
      padding: 20px;
    }
    .logo { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 3.5rem; margin-bottom: 10px; font-weight: 300; }
    .version { font-size: 0.9rem; color: #666; margin-bottom: 30px; }
    .download-btn {
      display: inline-block;
      padding: 18px 40px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #0066ff, #0055dd);
      color: white;
      font-size: 1.2rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-bottom: 40px;
    }
    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 102, 255, 0.4);
    }
    .features {
      margin-top: 20px;
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .feature {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 10px;
      width: 200px;
    }
    .feature-icon { font-size: 2rem; margin-bottom: 10px; }
    .feature-title { font-size: 1rem; font-weight: 500; margin-bottom: 5px; }
    .feature-desc { font-size: 0.85rem; color: #888; }
    .pro-badge {
      display: inline-block;
      background: linear-gradient(135deg, #ff9500, #ff6b00);
      color: white;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      margin-left: 10px;
      vertical-align: middle;
    }
    .price {
      font-size: 1.5rem;
      color: #aaa;
      margin-bottom: 20px;
    }
    .price span { color: #22c55e; font-weight: bold; }
    .footer {
      position: absolute;
      bottom: 20px;
      color: #666;
      font-size: 0.85rem;
    }
    .footer a { color: #888; text-decoration: none; }
    .footer a:hover { color: #aaa; }
    @media (max-width: 600px) {
      h1 { font-size: 2rem; }
      .features { gap: 15px; }
      .feature { width: 150px; padding: 15px; }
    }
  </style>
</head>
<body>
  <div class="logo">🎙️</div>
  <h1>Knner <span class="pro-badge">PRO</span></h1>
<p class="version">Version 1.0.3</p>
   
  <a href="https://github.com/Jimfunghk/knotwhisper/releases/download/v1.0.3/Knner_1.0.3_x64-setup.exe" class="download-btn">
    ⬇️ Download for Windows
  </a>
  
  <div class="price">$39 <span> lifetime license</span></div>

  <div class="features">
    <div class="feature">
      <div class="feature-icon">🎙️</div>
      <div class="feature-title">Voice to Text</div>
      <div class="feature-desc">100+ languages supported</div>
    </div>
    <div class="feature">
      <div class="feature-icon">⚡</div>
      <div class="feature-title">Fast Transcription</div>
      <div class="feature-desc">Powered by AI/Whisper</div>
    </div>
    <div class="feature">
      <div class="feature-icon">🔒</div>
      <div class="feature-title">Privacy First</div>
      <div class="feature-desc">All processing local</div>
    </div>
    <div class="feature">
      <div class="feature-icon">🎯</div>
      <div class="feature-title">Hotkey Control</div>
      <div class="feature-desc">Press to start/stop</div>
    </div>
  </div>

  <div class="footer">
    <a href="https://github.com/Jimfunghk/knotwhisper">GitHub</a> · 
    <a href="https://github.com/Jimfunghk/knotwhisper/releases">Releases</a>
  </div>
</body>
</html>

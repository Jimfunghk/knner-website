<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knner - Coming Soon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: white;
      text-align: center;
      padding: 20px;
    }
    .logo { font-size: 64px; margin-bottom: 30px; }
    h1 { font-size: 3.5rem; margin-bottom: 15px; font-weight: 300; }
    p { font-size: 1.2rem; color: #aaa; margin-bottom: 40px; max-width: 500px; }
    .countdown {
      display: flex;
      gap: 20px;
      margin-bottom: 50px;
    }
    .countdown-item {
      background: rgba(255,255,255,0.08);
      padding: 25px 20px;
      border-radius: 12px;
      min-width: 90px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .countdown-item span {
      display: block;
      font-size: 2.5rem;
      font-weight: bold;
      color: #fff;
    }
    .countdown-item label {
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .email-form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .email-form input {
      padding: 15px 20px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      font-size: 1rem;
      width: 300px;
      background: rgba(255,255,255,0.05);
      color: white;
    }
    .email-form input::placeholder { color: #666; }
    .email-form button {
      padding: 15px 30px;
      border: none;
      border-radius: 8px;
      background: #0066ff;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 500;
    }
    .email-form button:hover { background: #0055dd; }
    .features {
      margin-top: 60px;
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .feature {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 10px;
      width: 200px;
    }
    .feature-icon { font-size: 2rem; margin-bottom: 10px; }
    .feature-title { font-size: 1rem; font-weight: 500; margin-bottom: 5px; }
    .feature-desc { font-size: 0.85rem; color: #888; }
    @media (max-width: 600px) {
      h1 { font-size: 2rem; }
      .countdown { gap: 10px; }
      .countdown-item { padding: 15px 10px; min-width: 70px; }
      .countdown-item span { font-size: 1.5rem; }
      .email-form input { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="logo">🎙️</div>
  <h1>Knner</h1>
  <p>Voice transcription powered by AI. Coming soon with pro features.</p>
  
  <div class="countdown">
    <div class="countdown-item">
      <span id="days">00</span>
      <label>Days</label>
    </div>
    <div class="countdown-item">
      <span id="hours">00</span>
      <label>Hours</label>
    </div>
    <div class="countdown-item">
      <span id="minutes">00</span>
      <label>Minutes</label>
    </div>
    <div class="countdown-item">
      <span id="seconds">00</span>
      <label>Seconds</label>
    </div>
  </div>

  <form class="email-form" onsubmit="event.preventDefault(); this.querySelector('button').textContent='Thank you!'; this.querySelector('button').style.background='#22c55e';">
    <input type="email" placeholder="Enter your email" required>
    <button type="submit">Notify Me</button>
  </form>

  <div class="features">
    <div class="feature">
      <div class="feature-icon">🎙️</div>
      <div class="feature-title">Voice to Text</div>
      <div class="feature-desc">100+ languages supported</div>
    </div>
    <div class="feature">
      <div class="feature-icon">⚡</div>
      <div class="feature-title">Fast Transcription</div>
      <div class="feature-desc">Powered by AI/Whisper</div>
    </div>
    <div class="feature">
      <div class="feature-icon">🔒</div>
      <div class="feature-title">Privacy First</div>
      <div class="feature-desc">All processing local</div>
    </div>
  </div>

  <script>
    const launchDate = new Date();
    launchDate.setDate(launchDate.getDate() + 14);
    
    function updateCountdown() {
      const now = new Date();
      const diff = launchDate - now;
      
      if (diff > 0) {
        document.getElementById('days').textContent = String(Math.floor(diff / (1000 * 60 * 60 * 24))).padStart(2, '0');
        document.getElementById('hours').textContent = String(Math.floor((diff / (1000 * 60 * 60)) % 24)).padStart(2, '0');
        document.getElementById('minutes').textContent = String(Math.floor((diff / (1000 * 60)) % 60)).padStart(2, '0');
        document.getElementById('seconds').textContent = String(Math.floor((diff / 1000) % 60)).padStart(2, '0');
      }
    }
    
    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
